
version: "3.9"

services:

  db:
    image: postgres:15
    container_name: wiki_db
    restart: always
    environment:
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_pass2024
      POSTGRES_DB: wiki_explorer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wiki_redis
    ports:
      - "6379:6379"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: wiki_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    container_name: wiki_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
    container_name: wiki_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      BACKEND_URL: http://api:8000
      NEXT_PUBLIC_APP_NAME: Wikipedia Knowledge Explorer
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  postgres_data:

